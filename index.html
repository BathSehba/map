<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>US Contact Distribution</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="margin:0;font-family:system-ui;">

<div id="map-container" style="max-width:900px;margin:auto;">

  <div style="display:flex; justify-content:space-between; align-items:center; margin:10px;">
    <h3 style="margin:0;">US Contact Distribution</h3>
    <div style="font-size:12px; display:flex; align-items:center; gap:6px;">
      <span>Low</span>
      <div style="width:120px;height:10px;background:linear-gradient(to right,#DCEBED,#B3C9CD,#4F6F75);border-radius:4px;"></div>
      <span>High</span>
    </div>
  </div>

  <svg id="map" viewBox="0 0 960 600" style="width:100%;"></svg>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson@3"></script>

<script>
const data = {
  TN:51,CA:41,TX:27,NY:25,FL:22,IL:19,MA:18,NJ:18,GA:11,PA:11,MD:9,KY:9,OH:9,NC:7,
  MI:6,WI:6,VA:5,MO:5,MN:4,SC:3,CO:3,AZ:3,WA:3,MS:2,CT:2,NV:2,OK:2,IN:2,KS:2,
  DE:1,AL:1,NM:1,NE:1,ME:1,DC:1,ND:1,SD:1,IA:1,WV:1,AR:1,OR:1,AK:1,VT:1,LA:1,
  PR:3, VI:1
};

const abbrevToName = {
  AL:'Alabama',AK:'Alaska',AZ:'Arizona',AR:'Arkansas',CA:'California',CO:'Colorado',CT:'Connecticut',
  DE:'Delaware',FL:'Florida',GA:'Georgia',HI:'Hawaii',ID:'Idaho',IL:'Illinois',IN:'Indiana',IA:'Iowa',
  KS:'Kansas',KY:'Kentucky',LA:'Louisiana',ME:'Maine',MD:'Maryland',MA:'Massachusetts',MI:'Michigan',
  MN:'Minnesota',MS:'Mississippi',MO:'Missouri',MT:'Montana',NE:'Nebraska',NV:'Nevada',NH:'New Hampshire',
  NJ:'New Jersey',NM:'New Mexico',NY:'New York',NC:'North Carolina',ND:'North Dakota',OH:'Ohio',
  OK:'Oklahoma',OR:'Oregon',PA:'Pennsylvania',RI:'Rhode Island',SC:'South Carolina',SD:'South Dakota',
  TN:'Tennessee',TX:'Texas',UT:'Utah',VT:'Vermont',VA:'Virginia',WA:'Washington',
  WV:'West Virginia',WI:'Wisconsin',WY:'Wyoming',DC:'District of Columbia'
};

const values = {};
Object.entries(data).forEach(([k,v])=>{
  if(abbrevToName[k]) values[abbrevToName[k]] = v;
});

const tooltip = d3.select("body")
  .append("div")
  .style("position", "absolute")
  .style("background", "#111")
  .style("color", "#fff")
  .style("padding", "6px 10px")
  .style("border-radius", "6px")
  .style("font-size", "12px")
  .style("pointer-events","none")
  .style("opacity", 0);

const maxVal = d3.max(Object.values(data));

const color = d3.scaleLinear()
  .domain([0, maxVal * 0.5, maxVal])
  .range(["#DCEBED", "#B3C9CD", "#4F6F75"]);

const svg = d3.select("#map");
const path = d3.geoPath(d3.geoAlbersUsa().scale(900).translate([480,300]));

d3.json("https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json").then(us=>{
  const states = topojson.feature(us, us.objects.states).features;

  svg.selectAll("path")
    .data(states)
    .enter().append("path")
    .attr("d", path)
    .attr("fill", d=>{
      const v = values[d.properties.name];
      return v ? color(v) : "#F1F5F4";
    })
    .attr("stroke","#D1D5DB")
    .on("mouseover", function(event, d) {
      const v = values[d.properties.name] || 0;

      d3.select(this)
        .attr("stroke", "#111")
        .attr("stroke-width", 2);

      tooltip
        .style("opacity", 1)
        .html(`<strong>${d.properties.name}</strong><br>${v} contacts`);
    })
    .on("mousemove", function(event) {
      tooltip
        .style("left", (event.pageX + 10) + "px")
        .style("top", (event.pageY - 20) + "px");
    })
    .on("mouseout", function() {
      d3.select(this)
        .attr("stroke", "#D1D5DB")
        .attr("stroke-width", 1);

      tooltip.style("opacity", 0);
    });

  svg.append("rect")
    .attr("x",760).attr("y",520)
    .attr("width",60).attr("height",30)
    .attr("fill", color(data.PR));

  svg.append("text")
    .attr("x",790).attr("y",515)
    .attr("text-anchor","middle")
    .style("font-size","11px")
    .text("Puerto Rico");

  svg.append("text")
    .attr("x",790).attr("y",540)
    .attr("text-anchor","middle")
    .style("font-size","11px")
    .text(data.PR);

  svg.append("rect")
    .attr("x",830).attr("y",520)
    .attr("width",40).attr("height",30)
    .attr("fill", color(data.VI));

  svg.append("text")
    .attr("x",850).attr("y",515)
    .attr("text-anchor","middle")
    .style("font-size","11px")
    .text("VI");

  svg.append("text")
    .attr("x",850).attr("y",540)
    .attr("text-anchor","middle")
    .style("font-size","11px")
    .text(data.VI);
});
</script>

</body>
</html>
